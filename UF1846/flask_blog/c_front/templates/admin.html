{% extends 'base.html' %}
{%block content%}
<h1>Panel de administrador</h1>
<a href="/admin/create">Nuevo post</a>
<a href="/logout">Logout</a>
{% for post in posts %}
<div>
    <h2>{{post.titulo}}</h2>
    <p>{{post.estado}}</p>
    <p>{{post.f_alta}}</p>
    <p>
        <a href="/admin/edit/{{post.id}}">Editar</a><br>
        <a href="/admin/delete/{{post.id}}">Eliminar</a>
    </p>
</div>
{%endfor%}
{%endblock%}
